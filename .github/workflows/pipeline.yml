name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' &&
    !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run validation
        run: pnpm run ci:validate

  build-sea:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: dotweave-linux-x64
            executable_path: packages/cli/dist/sea/dotweave
          - os: ubuntu-24.04-arm
            artifact_name: dotweave-linux-arm64
            executable_path: packages/cli/dist/sea/dotweave
          # macos-26 is arm64. Keep the artifact name explicit while darwin-x64
          # SEA builds are disabled due to Node 25 SIGSEGV on launch.
          - os: macos-26
            artifact_name: dotweave-darwin-arm64
            executable_path: packages/cli/dist/sea/dotweave
          # - os: macos-26-intel
          #   artifact_name: dotweave-darwin-x64
          #   executable_path: packages/cli/dist/sea/dotweave
          - os: windows-latest
            artifact_name: dotweave-win32-x64.exe
            executable_path: packages/cli/dist/sea/dotweave.exe
          - os: windows-latest
            artifact_name: dotweave-win32-arm64.exe
            executable_path: packages/cli/dist/sea/dotweave.exe
    runs-on: ${{ matrix.os }}
    env:
      ESIGNER_USERNAME: ${{ secrets.ESIGNER_USERNAME }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SEA
        run: pnpm --filter @tinyrack/dotweave run sea:build

      - name: Sign and Notarize macOS binary
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "Importing Apple Certificate..."
            echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
            security create-keychain -p actions build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p actions build.keychain
            security import certificate.p12 -k build.keychain -P $APPLE_CERTIFICATE_PASSWORD -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
            codesign --deep --force --options runtime --entitlements packages/cli/entitlements.plist --sign "$APPLE_DEVELOPER_ID" ${{ matrix.executable_path }}

            if [ -n "$APPLE_NOTARY_KEY_P8_BASE64" ]; then
              echo "Notarizing macOS binary..."
              echo $APPLE_NOTARY_KEY_P8_BASE64 | base64 --decode > AuthKey.p8
              zip -j ${{ matrix.executable_path }}.zip ${{ matrix.executable_path }}
              xcrun notarytool submit ${{ matrix.executable_path }}.zip --key AuthKey.p8 --key-id "$APPLE_NOTARY_KEY_ID" --issuer "$APPLE_NOTARY_ISSUER_ID" --wait
            else
              echo "No Notary API Key found. Skipping notarization."
            fi
          else
            echo "No Apple Certificate found. Performing ad-hoc signing..."
            codesign --sign - ${{ matrix.executable_path }}
          fi

      - name: Sign Windows binary (SSL.com eSigner)
        if: startsWith(matrix.os, 'windows') && env.ESIGNER_USERNAME != ''
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.ESIGNER_USERNAME }}
          password: ${{ secrets.ESIGNER_PASSWORD }}
          credential_id: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ESIGNER_TOTP_SECRET }}
          file_path: ${{ matrix.executable_path }}
          environment_name: PROD

      - name: Smoke test SEA executable
        run: pnpm --filter @tinyrack/dotweave run sea:smoke -- --skip-build

      - name: Rename executable
        shell: bash
        run: mv ${{ matrix.executable_path }} packages/cli/dist/sea/${{
          matrix.artifact_name }}

      - name: Upload SEA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: packages/cli/dist/sea/${{ matrix.artifact_name }}
          if-no-files-found: error

  publish-release:
    needs:
      - validate
      - build-sea
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: >-
          node --input-type=module -e 'import pkg from
          "./packages/cli/package.json" with { type: "json" }; const tag =
          process.env.GITHUB_REF_NAME; const expectedTag = `v${pkg.version}`; if
          (tag !== expectedTag) { console.error(`Tag ${tag} does not match
          package.json version ${expectedTag}`); process.exit(1); }'

      - name: Copy README and LICENSE
        run: |
          cp README.md packages/cli/
          cp LICENSE packages/cli/

      - name: Verify published package contents
        run: pnpm --filter @tinyrack/dotweave pack --dry-run

      - name: Publish package to npm
        run: pnpm --filter @tinyrack/dotweave publish --provenance --access public
          --no-git-checks

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release ${GITHUB_REF_NAME} already exists"
          else
            gh release create "${GITHUB_REF_NAME}" --generate-notes
          fi

      - name: Download SEA artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dotweave-*
          path: release-assets
          merge-multiple: true

      - name: Upload SEA artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r artifact_path; do
            gh release upload "${GITHUB_REF_NAME}" "${artifact_path}" --clobber
          done < <(find release-assets -type f | sort)
