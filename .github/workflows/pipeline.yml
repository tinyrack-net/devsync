name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' &&
    !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Run lint
        run: pnpm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Run typecheck
        run: pnpm run typecheck

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-2022
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Build
        run: pnpm run build
      - name: Run tests
        run: pnpm run test

  autocomplete-shell-smoke:
    name: Autocomplete (${{ matrix.os }} / ${{ matrix.shell }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
          - os: ubuntu-latest
            shell: zsh
          - os: macos-26
            shell: bash
          - os: macos-26
            shell: zsh
          - os: windows-2022
            shell: powershell
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Install zsh (Ubuntu)
        if: matrix.os == 'ubuntu-latest' && matrix.shell == 'zsh'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Build
        run: pnpm --filter @tinyrack/dotweave run build
      - name: Run autocomplete shell smoke tests
        env:
          DOTWEAVE_AUTOCOMPLETE_SHELL: ${{ matrix.shell }}
        run: pnpm --filter @tinyrack/dotweave run test:autocomplete

  build-pkg:
    name: Build Pkg
    needs:
      - lint
      - typecheck
      - test
      - autocomplete-shell-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Build pkg
        run: pnpm --filter @tinyrack/dotweave run pkg:build --target
          node24-linux-x64,node24-linux-arm64,node24-macos-x64,node24-macos-arm64,node24-win-x64,node24-win-arm64

      - name: Upload Linux x64
        uses: actions/upload-artifact@v7
        with:
          name: dotweave-linux-x64
          path: packages/cli/dist/pkg/dotweave-linux-x64
          if-no-files-found: error

      - name: Upload Linux arm64
        uses: actions/upload-artifact@v7
        with:
          name: dotweave-linux-arm64
          path: packages/cli/dist/pkg/dotweave-linux-arm64
          if-no-files-found: error

      - name: Upload macOS x64
        uses: actions/upload-artifact@v7
        with:
          name: dotweave-darwin-x64
          path: packages/cli/dist/pkg/dotweave-macos-x64
          if-no-files-found: error

      - name: Upload macOS arm64
        uses: actions/upload-artifact@v7
        with:
          name: dotweave-darwin-arm64
          path: packages/cli/dist/pkg/dotweave-macos-arm64
          if-no-files-found: error

      - name: Upload Windows x64
        uses: actions/upload-artifact@v7
        with:
          name: dotweave-win32-x64.exe
          path: packages/cli/dist/pkg/dotweave-win-x64.exe
          if-no-files-found: error

      - name: Upload Windows arm64
        uses: actions/upload-artifact@v7
        with:
          name: dotweave-win32-arm64.exe
          path: packages/cli/dist/pkg/dotweave-win-arm64.exe
          if-no-files-found: error

  smoke-test:
    name: Smoke Test (${{ matrix.platform }}-${{ matrix.arch }})
    needs: build-pkg
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: dotweave-linux-x64
            arch: x64
          - os: macos-26
            platform: darwin
            artifact: dotweave-darwin-x64
            arch: x64
          - os: macos-26
            platform: darwin
            artifact: dotweave-darwin-arm64
            arch: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/dist/pkg

      - name: Restore executable permissions
        shell: bash
        run: chmod +x packages/cli/dist/pkg/dotweave-*

      - name: Smoke test binary
        shell: bash
        run: |
          fname="dotweave-${{ matrix.platform == 'darwin' && 'macos' || 'linux' }}-${{ matrix.arch }}"
          pnpm --filter @tinyrack/dotweave-tools run cli pkg smoke --skip-build --executablePath "packages/cli/dist/pkg/$fname"

  sign-and-test:
    name: Sign & Test (${{ matrix.platform }}-${{ matrix.arch }})
    needs: build-pkg
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: dotweave-linux-x64
            arch: x64
          - os: ubuntu-latest
            platform: linux
            artifact: dotweave-linux-arm64
            arch: arm64
          - os: macos-26
            platform: darwin
            artifact: dotweave-darwin-x64
            arch: x64
          - os: macos-26
            platform: darwin
            artifact: dotweave-darwin-arm64
            arch: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/dist/pkg

      - name: Restore executable permissions
        shell: bash
        run: chmod +x packages/cli/dist/pkg/dotweave-*

      - name: Sign binary (macOS)
        if: matrix.platform == 'darwin'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: |
          pnpm --filter @tinyrack/dotweave-tools run cli sign macos \
            --executablePath packages/cli/dist/pkg/dotweave-macos-${{ matrix.arch }} \
            ${{ !startsWith(github.ref, 'refs/tags/v') && '--skip-notarize' || '' }}

      - name: Smoke test binary
        if: matrix.platform == 'darwin' || matrix.arch == 'x64'
        shell: bash
        run: |
          fname="dotweave-${{ matrix.platform == 'darwin' && 'macos' || 'linux' }}-${{ matrix.arch }}"
          pnpm --filter @tinyrack/dotweave-tools run cli pkg smoke --skip-build --executablePath "packages/cli/dist/pkg/$fname"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/dist/pkg/dotweave-*
          overwrite: true
          if-no-files-found: error

  # Windows remains separate because MSIX packaging uses Windows SDK tools.
  package-windows:
    name: Package & Test (Windows)
    needs: build-pkg
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Download Windows x64
        uses: actions/download-artifact@v8
        with:
          name: dotweave-win32-x64.exe
          path: packages/cli/dist/pkg

      - name: Download Windows arm64
        uses: actions/download-artifact@v8
        with:
          name: dotweave-win32-arm64.exe
          path: packages/cli/dist/pkg

      - name: Smoke test x64 binary
        run: pnpm --filter @tinyrack/dotweave-tools run cli pkg smoke --skip-build
          --executablePath packages/cli/dist/pkg/dotweave-win-x64.exe

      - name: Build Windows x64 MSIX
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        env:
          MSIX_IDENTITY_NAME: ${{ secrets.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER: ${{ secrets.MSIX_PUBLISHER }}
          MSIX_PUBLISHER_DISPLAY_NAME: ${{ secrets.MSIX_PUBLISHER_DISPLAY_NAME }}
        run: pnpm --filter @tinyrack/dotweave-tools run cli msix build
          --arch x64 --executablePath packages/cli/dist/pkg/dotweave-win-x64.exe

      - name: Build Windows arm64 MSIX
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        env:
          MSIX_IDENTITY_NAME: ${{ secrets.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER: ${{ secrets.MSIX_PUBLISHER }}
          MSIX_PUBLISHER_DISPLAY_NAME: ${{ secrets.MSIX_PUBLISHER_DISPLAY_NAME }}
        run: pnpm --filter @tinyrack/dotweave-tools run cli msix build
          --arch arm64 --executablePath packages/cli/dist/pkg/dotweave-win-arm64.exe

      - name: Smoke test MSIX alias
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        env:
          MSIX_IDENTITY_NAME: ${{ secrets.MSIX_IDENTITY_NAME }}
        run: |
          $existing = Get-AppxPackage -Name "$env:MSIX_IDENTITY_NAME" -ErrorAction SilentlyContinue
          if ($existing) {
            Remove-AppxPackage -Package $existing.PackageFullName
          }
          Add-AppxPackage -Register (Resolve-Path "packages/cli/dist/msix/x64/AppxManifest.xml")
          try {
            dotweave.exe --version
          } finally {
            $package = Get-AppxPackage -Name "$env:MSIX_IDENTITY_NAME" -ErrorAction SilentlyContinue
            if ($package) {
              Remove-AppxPackage -Package $package.PackageFullName
            }
          }

      - name: Bundle Windows MSIX packages
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: pnpm --filter @tinyrack/dotweave-tools run cli msix bundle

      - name: Upload Windows x64
        uses: actions/upload-artifact@v7
        with:
          name: dotweave-win32-x64.exe
          path: packages/cli/dist/pkg/dotweave-win-x64.exe
          overwrite: true
          if-no-files-found: error

      - name: Upload Windows arm64
        uses: actions/upload-artifact@v7
        with:
          name: dotweave-win32-arm64.exe
          path: packages/cli/dist/pkg/dotweave-win-arm64.exe
          overwrite: true
          if-no-files-found: error

      - name: Upload Windows x64 MSIX
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: dotweave-win32-x64-msix
          path: packages/cli/dist/pkg/dotweave-win-x64.msix
          overwrite: true
          if-no-files-found: error

      - name: Upload Windows arm64 MSIX
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: dotweave-win32-arm64-msix
          path: packages/cli/dist/pkg/dotweave-win-arm64.msix
          overwrite: true
          if-no-files-found: error

      - name: Upload Windows MSIX bundle
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: dotweave-windows-msixbundle
          path: packages/cli/dist/pkg/dotweave-windows.msixbundle
          overwrite: true
          if-no-files-found: error

  build-appimage:
    name: Build AppImage (${{ matrix.arch }})
    needs:
      - lint
      - typecheck
      - test
      - build-pkg
      - sign-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dotweave-linux-x64
            arch: x86_64
          - os: ubuntu-24.04-arm
            artifact: dotweave-linux-arm64
            arch: aarch64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Download pkg artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/dist/pkg

      - name: Build AppImage
        run: pnpm --filter @tinyrack/dotweave-tools run cli appimage build
          --executablePath packages/cli/dist/pkg/${{ matrix.artifact }}
          --outputPath ${{ matrix.artifact }}.AppImage --arch ${{ matrix.arch }}

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-appimage
          path: ${{ matrix.artifact }}.AppImage

  publish-release:
    name: Publish Release
    needs:
      - lint
      - typecheck
      - test
      - build-pkg
      - sign-and-test
      - package-windows
      - build-appimage
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          install: 'true'

      - name: Set up registry
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        run: pnpm --filter @tinyrack/dotweave-tools run cli verify release-tag

      - name: Copy README and LICENSE
        run: |
          cp README.md packages/cli/
          cp LICENSE packages/cli/

      - name: Verify published package contents
        run: pnpm --filter @tinyrack/dotweave pack --dry-run

      - name: Publish package to npm
        run: pnpm --filter @tinyrack/dotweave publish --provenance --access public
          --no-git-checks

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release ${GITHUB_REF_NAME} already exists"
          else
            gh release create "${GITHUB_REF_NAME}" --generate-notes
          fi

      - name: Download pkg artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dotweave-*
          path: release-assets
          merge-multiple: true

      - name: Upload pkg artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r artifact_path; do
            gh release upload "${GITHUB_REF_NAME}" "${artifact_path}" --clobber
          done < <(find release-assets -type f | sort)

      - name: Generate Homebrew Formula
        run: pnpm --filter @tinyrack/dotweave-tools run cli homebrew generate --version
          "${GITHUB_REF_NAME}" --artifacts-dir "${{ github.workspace
          }}/release-assets"

      - name: Checkout Homebrew Tap
        uses: actions/checkout@v5
        with:
          repository: tinyrack-net/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Homebrew Tap
        run: |
          mkdir -p homebrew-tap/Formula
          cp release-assets/dotweave*.rb homebrew-tap/Formula/
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/dotweave*.rb
          git commit -m "Update dotweave to ${GITHUB_REF_NAME}" || echo "No changes to commit"
          git push

  publish-winget:
    name: Publish WinGet
    needs: publish-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2022
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Submit WinGet manifest update
        shell: powershell
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:WINGET_CREATE_GITHUB_TOKEN)) {
            throw "WINGET_TOKEN repository secret is required for WinGet publishing."
          }

          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$env:GITHUB_REF_NAME"
          $releaseNotesUrl = "https://github.com/${{ github.repository }}/releases/tag/$env:GITHUB_REF_NAME"

          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update tinyrack.dotweave `
            --version $version `
            --urls "$downloadUrl/dotweave-win-x64.exe|x64" "$downloadUrl/dotweave-win-arm64.exe|arm64" `
            --release-notes-url "$releaseNotesUrl" `
            --submit `
            --no-open

  publish-store:
    name: Publish to Microsoft Store
    needs: publish-release
    if: false # Temporarily disabled
    # if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Download MSIX bundle
        uses: actions/download-artifact@v8
        with:
          name: dotweave-windows-msixbundle
          path: store-assets

      - name: Set up Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Configure Microsoft Store CLI
        shell: powershell
        env:
          PARTNER_CENTER_TENANT_ID: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
          PARTNER_CENTER_SELLER_ID: ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          PARTNER_CENTER_CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
          PARTNER_CENTER_CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}
        run: |
          msstore reconfigure `
            --tenantId "$env:PARTNER_CENTER_TENANT_ID" `
            --sellerId "$env:PARTNER_CENTER_SELLER_ID" `
            --clientId "$env:PARTNER_CENTER_CLIENT_ID" `
            --clientSecret "$env:PARTNER_CENTER_CLIENT_SECRET"

      - name: Publish MSIX bundle to Store
        shell: powershell
        env:
          MSSTORE_PRODUCT_ID: ${{ secrets.MSSTORE_PRODUCT_ID }}
        run: |
          $bundle = Resolve-Path "store-assets/dotweave-windows.msixbundle"
          msstore publish "$bundle" -id "$env:MSSTORE_PRODUCT_ID"
          msstore submission poll "$env:MSSTORE_PRODUCT_ID"

  publish-snap:
    name: Publish Snap (${{ matrix.artifact }})
    needs:
      - lint
      - typecheck
      - test
      - build-pkg
      - sign-and-test
    if: false # Temporarily disabled
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dotweave-linux-x64
          - os: ubuntu-24.04-arm
            artifact: dotweave-linux-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Download pkg artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: bin-temp

      - name: Prepare binary
        run: |
          mv bin-temp/${{ matrix.artifact }} ./dotweave
          chmod +x ./dotweave

      - name: Build Snap
        id: build
        uses: snapcore/action-build@v1

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-snap
          path: ${{ steps.build.outputs.snap }}

      - name: Publish Snap
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          store_login: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          snap: ${{ steps.build.outputs.snap }}
          release: stable
