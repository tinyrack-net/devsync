name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' &&
    !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run validation
        run: bun run ci:validate

  build-sea:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runs_on: ubuntu-latest
            targets: "bun-linux-x64 bun-linux-arm64"
            artifact_1: dotweave-linux-x64
            artifact_2: dotweave-linux-arm64
            native_artifact: dotweave-linux-x64
          - os: macos
            runs_on: macos-26
            targets: "bun-darwin-arm64 bun-darwin-x64"
            artifact_1: dotweave-darwin-arm64
            artifact_2: dotweave-darwin-x64
            native_artifact: dotweave-darwin-arm64
          - os: windows
            runs_on: [self-hosted, windows]
            targets: "bun-windows-x64 bun-windows-arm64"
            artifact_1: dotweave-win32-x64.exe
            artifact_2: dotweave-win32-arm64.exe
            native_artifact: dotweave-win32-x64.exe
    runs-on: ${{ matrix.runs_on }}
    env:
      ESIGNER_USERNAME: ${{ secrets.ESIGNER_USERNAME }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SEA executables
        shell: bash
        run: |
          read -ra TARGETS <<< "${{ matrix.targets }}"
          artifacts=("${{ matrix.artifact_1 }}" "${{ matrix.artifact_2 }}")
          for i in "${!TARGETS[@]}"; do
            target="${TARGETS[$i]}"
            artifact="${artifacts[$i]}"
            bun run --filter @tinyrack/dotweave-tools cli sea build --target "$target"
            if [[ "$artifact" == *.exe ]]; then
              mv packages/cli/dist/sea/dotweave.exe "packages/cli/dist/sea/$artifact"
            else
              mv packages/cli/dist/sea/dotweave "packages/cli/dist/sea/$artifact"
            fi
          done

      - name: Sign and Notarize macOS binaries
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: |
          for artifact in "${{ matrix.artifact_1 }}" "${{ matrix.artifact_2 }}"; do
            cp "packages/cli/dist/sea/$artifact" packages/cli/dist/sea/dotweave
            bun run --filter @tinyrack/dotweave-tools cli sign macos --executablePath packages/cli/dist/sea/dotweave
            mv packages/cli/dist/sea/dotweave "packages/cli/dist/sea/$artifact"
          done

      - name: Sign Windows x64 binary (SSL.com eSigner)
        if: startsWith(matrix.os, 'windows') && env.ESIGNER_USERNAME != ''
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.ESIGNER_USERNAME }}
          password: ${{ secrets.ESIGNER_PASSWORD }}
          credential_id: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ESIGNER_TOTP_SECRET }}
          file_path: packages/cli/dist/sea/dotweave-win32-x64.exe
          environment_name: PROD

      - name: Sign Windows arm64 binary (SSL.com eSigner)
        if: startsWith(matrix.os, 'windows') && env.ESIGNER_USERNAME != ''
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.ESIGNER_USERNAME }}
          password: ${{ secrets.ESIGNER_PASSWORD }}
          credential_id: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ESIGNER_TOTP_SECRET }}
          file_path: packages/cli/dist/sea/dotweave-win32-arm64.exe
          environment_name: PROD

      - name: Smoke test SEA executable
        shell: bash
        run: |
          cp "packages/cli/dist/sea/${{ matrix.native_artifact }}" packages/cli/dist/sea/dotweave
          chmod +x packages/cli/dist/sea/dotweave
          bun run --filter @tinyrack/dotweave sea:smoke

      - name: Upload first SEA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_1 }}
          path: packages/cli/dist/sea/${{ matrix.artifact_1 }}
          if-no-files-found: error

      - name: Upload second SEA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_2 }}
          path: packages/cli/dist/sea/${{ matrix.artifact_2 }}
          if-no-files-found: error

  build-appimage:
    needs:
      - validate
      - build-sea
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dotweave-linux-x64
            arch: x86_64
          - os: ubuntu-24.04-arm
            artifact: dotweave-linux-arm64
            arch: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download SEA artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/dist/sea

      - name: Build AppImage
        run: bun run --filter @tinyrack/dotweave-tools cli appimage build --executablePath packages/cli/dist/sea/${{ matrix.artifact }} --outputPath ${{ matrix.artifact }}.AppImage --arch ${{ matrix.arch }}

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-appimage
          path: ${{ matrix.artifact }}.AppImage

  publish-release:
    needs:
      - validate
      - build-sea
      - build-appimage
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package version
        run: bun run --filter @tinyrack/dotweave-tools cli verify release-tag

      - name: Copy README and LICENSE
        run: |
          cp README.md packages/cli/
          cp LICENSE packages/cli/

      - name: Build CLI package
        run: bun run --filter @tinyrack/dotweave build

      - name: Verify published package contents
        run: bun run --filter @tinyrack/dotweave pack --dry-run

      - name: Publish package to npm
        run: bun publish --access public --no-git-checks
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release ${GITHUB_REF_NAME} already exists"
          else
            gh release create "${GITHUB_REF_NAME}" --generate-notes
          fi

      - name: Download SEA artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dotweave-*
          path: release-assets
          merge-multiple: true

      - name: Upload SEA artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r artifact_path; do
            gh release upload "${GITHUB_REF_NAME}" "${artifact_path}" --clobber
          done < <(find release-assets -type f | sort)

      - name: Generate Homebrew Formula
        run: bun run --filter @tinyrack/dotweave-tools cli homebrew generate --version "${GITHUB_REF_NAME}" --artifacts-dir "${{ github.workspace }}/release-assets"

      - name: Checkout Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: tinyrack-net/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Homebrew Tap
        run: |
          mkdir -p homebrew-tap/Formula
          cp release-assets/dotweave*.rb homebrew-tap/Formula/
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/dotweave*.rb
          git commit -m "Update dotweave to ${GITHUB_REF_NAME}" || echo "No changes to commit"
          git push

  publish-snap:
    needs:
      - validate
      - build-sea
    if: false # Temporarily disabled
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dotweave-linux-x64
          - os: ubuntu-24.04-arm
            artifact: dotweave-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download SEA artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin-temp

      - name: Prepare binary
        run: |
          mv bin-temp/${{ matrix.artifact }} ./dotweave
          chmod +x ./dotweave

      - name: Build Snap
        id: build
        uses: snapcore/action-build@v1

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-snap
          path: ${{ steps.build.outputs.snap }}

      - name: Publish Snap
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          store_login: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          snap: ${{ steps.build.outputs.snap }}
          release: stable
