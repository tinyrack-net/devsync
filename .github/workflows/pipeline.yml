name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' &&
    !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run validation
        run: pnpm run ci:validate

  build-pkg:
    needs: validate
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pkg
        run: pnpm --filter @tinyrack/dotweave run pkg:build --target node24-linux-x64,node24-linux-arm64,node24-macos-x64,node24-macos-arm64,node24-win-x64,node24-win-arm64

      - name: Upload dotweave-linux-x64
        uses: actions/upload-artifact@v4
        with:
          name: dotweave-linux-x64
          path: packages/cli/dist/pkg/dotweave-linux-x64
          if-no-files-found: error

      - name: Upload dotweave-linux-arm64
        uses: actions/upload-artifact@v4
        with:
          name: dotweave-linux-arm64
          path: packages/cli/dist/pkg/dotweave-linux-arm64
          if-no-files-found: error

      - name: Upload dotweave-darwin-x64
        uses: actions/upload-artifact@v4
        with:
          name: dotweave-darwin-x64
          path: packages/cli/dist/pkg/dotweave-macos-x64
          if-no-files-found: error

      - name: Upload dotweave-darwin-arm64
        uses: actions/upload-artifact@v4
        with:
          name: dotweave-darwin-arm64
          path: packages/cli/dist/pkg/dotweave-macos-arm64
          if-no-files-found: error

      - name: Upload dotweave-win32-x64.exe
        uses: actions/upload-artifact@v4
        with:
          name: dotweave-win32-x64.exe
          path: packages/cli/dist/pkg/dotweave-win-x64.exe
          if-no-files-found: error

      - name: Upload dotweave-win32-arm64.exe
        uses: actions/upload-artifact@v4
        with:
          name: dotweave-win32-arm64.exe
          path: packages/cli/dist/pkg/dotweave-win-arm64.exe
          if-no-files-found: error

  sign-and-test-linux:
    needs: build-pkg
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: dotweave-linux-x64
          path: packages/cli/dist/pkg

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: dotweave-linux-arm64
          path: packages/cli/dist/pkg

      - name: Restore executable permissions
        shell: bash
        run: |
          chmod +x packages/cli/dist/pkg/dotweave-linux-x64
          chmod +x packages/cli/dist/pkg/dotweave-linux-arm64

      - name: Smoke test x64 binary
        run: pnpm --filter @tinyrack/dotweave-tools run cli pkg smoke --skip-build --executablePath packages/cli/dist/pkg/dotweave-linux-x64

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotweave-linux-x64
          path: packages/cli/dist/pkg/dotweave-linux-x64
          overwrite: true
          if-no-files-found: error

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotweave-linux-arm64
          path: packages/cli/dist/pkg/dotweave-linux-arm64
          overwrite: true
          if-no-files-found: error

  sign-and-test-macos:
    needs: build-pkg
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: dotweave-darwin-arm64
          path: packages/cli/dist/pkg

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: dotweave-darwin-x64
          path: packages/cli/dist/pkg

      - name: Restore executable permissions
        shell: bash
        run: |
          chmod +x packages/cli/dist/pkg/dotweave-macos-arm64
          chmod +x packages/cli/dist/pkg/dotweave-macos-x64

      - name: Sign and Notarize arm64 binary
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: pnpm --filter @tinyrack/dotweave-tools run cli sign macos --executablePath packages/cli/dist/pkg/dotweave-macos-arm64

      - name: Sign and Notarize x64 binary
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: pnpm --filter @tinyrack/dotweave-tools run cli sign macos --executablePath packages/cli/dist/pkg/dotweave-macos-x64

      - name: Smoke test arm64 binary (native)
        run: pnpm --filter @tinyrack/dotweave-tools run cli pkg smoke --skip-build --executablePath packages/cli/dist/pkg/dotweave-macos-arm64

      - name: Smoke test x64 binary (Rosetta 2)
        run: pnpm --filter @tinyrack/dotweave-tools run cli pkg smoke --skip-build --executablePath packages/cli/dist/pkg/dotweave-macos-x64

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotweave-darwin-arm64
          path: packages/cli/dist/pkg/dotweave-macos-arm64
          overwrite: true
          if-no-files-found: error

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotweave-darwin-x64
          path: packages/cli/dist/pkg/dotweave-macos-x64
          overwrite: true
          if-no-files-found: error

  sign-and-test-windows:
    needs: build-pkg
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, Windows, X64]
    env:
      ESIGNER_USERNAME: ${{ secrets.ESIGNER_USERNAME }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: dotweave-win32-x64.exe
          path: packages/cli/dist/pkg

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: dotweave-win32-arm64.exe
          path: packages/cli/dist/pkg

      - name: Sign x64 binary (SSL.com eSigner)
        if: env.ESIGNER_USERNAME != ''
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.ESIGNER_USERNAME }}
          password: ${{ secrets.ESIGNER_PASSWORD }}
          credential_id: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ESIGNER_TOTP_SECRET }}
          file_path: packages/cli/dist/pkg/dotweave-win-x64.exe
          environment_name: PROD

      - name: Sign arm64 binary (SSL.com eSigner)
        if: env.ESIGNER_USERNAME != ''
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.ESIGNER_USERNAME }}
          password: ${{ secrets.ESIGNER_PASSWORD }}
          credential_id: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ESIGNER_TOTP_SECRET }}
          file_path: packages/cli/dist/pkg/dotweave-win-arm64.exe
          environment_name: PROD

      - name: Smoke test x64 binary
        run: pnpm --filter @tinyrack/dotweave-tools run cli pkg smoke --skip-build --executablePath packages/cli/dist/pkg/dotweave-win-x64.exe

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotweave-win32-x64.exe
          path: packages/cli/dist/pkg/dotweave-win-x64.exe
          overwrite: true
          if-no-files-found: error

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotweave-win32-arm64.exe
          path: packages/cli/dist/pkg/dotweave-win-arm64.exe
          overwrite: true
          if-no-files-found: error

  build-appimage:
    needs:
      - validate
      - build-pkg
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dotweave-linux-x64
            arch: x86_64
          - os: ubuntu-24.04-arm
            artifact: dotweave-linux-arm64
            arch: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download pkg artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/dist/pkg

      - name: Build AppImage
        run: pnpm --filter @tinyrack/dotweave-tools run cli appimage build --executablePath packages/cli/dist/pkg/${{ matrix.artifact }} --outputPath ${{ matrix.artifact }}.AppImage --arch ${{ matrix.arch }}

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-appimage
          path: ${{ matrix.artifact }}.AppImage

  publish-release:
    needs:
      - validate
      - build-pkg
      - sign-and-test-linux
      - sign-and-test-macos
      - sign-and-test-windows
      - build-appimage
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: pnpm --filter @tinyrack/dotweave-tools run cli verify release-tag

      - name: Copy README and LICENSE
        run: |
          cp README.md packages/cli/
          cp LICENSE packages/cli/

      - name: Verify published package contents
        run: pnpm --filter @tinyrack/dotweave pack --dry-run

      - name: Publish package to npm
        run: pnpm --filter @tinyrack/dotweave publish --provenance --access public
          --no-git-checks

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release ${GITHUB_REF_NAME} already exists"
          else
            gh release create "${GITHUB_REF_NAME}" --generate-notes
          fi

      - name: Download pkg artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dotweave-*
          path: release-assets
          merge-multiple: true

      - name: Upload pkg artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r artifact_path; do
            gh release upload "${GITHUB_REF_NAME}" "${artifact_path}" --clobber
          done < <(find release-assets -type f | sort)

      - name: Generate Homebrew Formula
        run: pnpm --filter @tinyrack/dotweave-tools run cli homebrew generate --version "${GITHUB_REF_NAME}" --artifacts-dir "${{ github.workspace }}/release-assets"

      - name: Checkout Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: tinyrack-net/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Homebrew Tap
        run: |
          mkdir -p homebrew-tap/Formula
          cp release-assets/dotweave*.rb homebrew-tap/Formula/
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/dotweave*.rb
          git commit -m "Update dotweave to ${GITHUB_REF_NAME}" || echo "No changes to commit"
          git push

  publish-snap:
    needs:
      - validate
      - build-pkg
      - sign-and-test-linux
    if: false # Temporarily disabled
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dotweave-linux-x64
          - os: ubuntu-24.04-arm
            artifact: dotweave-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download pkg artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin-temp

      - name: Prepare binary
        run: |
          mv bin-temp/${{ matrix.artifact }} ./dotweave
          chmod +x ./dotweave

      - name: Build Snap
        id: build
        uses: snapcore/action-build@v1

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-snap
          path: ${{ steps.build.outputs.snap }}

      - name: Publish Snap
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          store_login: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          snap: ${{ steps.build.outputs.snap }}
          release: stable
