name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: >-
          node --input-type=module -e 'import pkg from
          "./packages/cli/package.json" with { type: "json" }; const tag =
          process.env.GITHUB_REF_NAME; const
          expectedTag = `v${pkg.version}`; if (tag !== expectedTag) {
          console.error(`Tag ${tag} does not match package.json version
          ${expectedTag}`); process.exit(1); }'

      - name: Build
        run: pnpm --filter @tinyrack/dotweave build

      - name: Run validation
        run: pnpm --filter @tinyrack/dotweave check

      - name: Verify published package contents
        run: pnpm --filter @tinyrack/dotweave pack --dry-run

      - name: Publish package to npm
        run: pnpm --filter @tinyrack/dotweave publish --provenance --access public --no-git-checks

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} --generate-notes

  build-sea:
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: dotweave-linux-x64
            executable_path: packages/cli/dist/sea/dotweave
          - os: ubuntu-24.04-arm
            artifact_name: dotweave-linux-arm64
            executable_path: packages/cli/dist/sea/dotweave
          - os: macos-26
            artifact_name: dotweave-darwin-arm64
            executable_path: packages/cli/dist/sea/dotweave
          - os: macos-26-intel
            artifact_name: dotweave-darwin-x64
            executable_path: packages/cli/dist/sea/dotweave
          - os: windows-latest
            artifact_name: dotweave-win32-x64.exe
            executable_path: packages/cli/dist/sea/dotweave.exe
          - os: windows-latest
            artifact_name: dotweave-win32-arm64.exe
            executable_path: packages/cli/dist/sea/dotweave.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SEA
        run: pnpm --filter @tinyrack/dotweave run sea:build

      - name: Sign and Notarize macOS binary
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "Importing Apple Certificate..."
            echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
            security create-keychain -p actions build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p actions build.keychain
            security import certificate.p12 -k build.keychain -P $APPLE_CERTIFICATE_PASSWORD -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
            codesign --deep --force --options runtime --sign "$APPLE_DEVELOPER_ID" ${{ matrix.executable_path }}
            
            if [ -n "$APPLE_NOTARY_KEY_P8_BASE64" ]; then
              echo "Notarizing macOS binary..."
              echo $APPLE_NOTARY_KEY_P8_BASE64 | base64 --decode > AuthKey.p8
              zip -j ${{ matrix.executable_path }}.zip ${{ matrix.executable_path }}
              xcrun notarytool submit ${{ matrix.executable_path }}.zip --key AuthKey.p8 --key-id "$APPLE_NOTARY_KEY_ID" --issuer "$APPLE_NOTARY_ISSUER_ID" --wait
            else
              echo "No Notary API Key found. Skipping notarization."
            fi
          else
            echo "No Apple Certificate found. Performing ad-hoc signing..."
            codesign --sign - ${{ matrix.executable_path }}
          fi

      - name: Sign Windows binary (SSL.com eSigner)
        if: startsWith(matrix.os, 'windows') && env.ESIGNER_USERNAME != ''
        uses: sslcom/esigner-codesign@v1
        env:
          ESIGNER_USERNAME: ${{ secrets.ESIGNER_USERNAME }}
        with:
          command: sign
          username: ${{ secrets.ESIGNER_USERNAME }}
          password: ${{ secrets.ESIGNER_PASSWORD }}
          credential_id: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ESIGNER_TOTP_SECRET }}
          file_path: ${{ matrix.executable_path }}
          environment_name: PROD

      - name: Rename executable
        shell: bash
        run: mv ${{ matrix.executable_path }} packages/cli/dist/sea/${{ matrix.artifact_name }}

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} packages/cli/dist/sea/${{ matrix.artifact_name }} --clobber
